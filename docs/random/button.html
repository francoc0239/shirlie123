<!DOCTYPE html>
<html>

  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../style.css" />


    <title>Just Click Twin</title>
  </head>

  <body>
    <!-- HTML -->
    <div>

      <button onclick="no()">CLICK TO GET SHARTED</button>
      <div id="imageContainer"></div>
    </div>




    <p><a class="frontpagelinkk" href="../index.html">Home</a></p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // JS
      function no() {
        const container = document.getElementById('imageContainer');
        if (!container) {
          console.error('Container not found');
          return;
        }

        const newImage = document.createElement('img');
        newImage.src = '../../images/Shirlie1.png';
        newImage.alt = "yes";
        newImage.style.width = '200px';
        newImage.style.margin = '10px';
        newImage.classList.add('fade-in');

        container.appendChild(newImage);

        requestAnimationFrame(() => {
          newImage.classList.add('show');
        });
      }


    </script>
  </body>

</html>
